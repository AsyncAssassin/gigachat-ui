title = "gigachat-ui gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Safe placeholders"
regexes = [
  '''__SET_LOCALLY__''',
]

[[rules]]
id = "gigachat-auth-key-env"
description = "Possible GIGACHAT_AUTH_KEY value"
regex = '''(?i)GIGACHAT_AUTH_KEY\s*[:=]\s*["']?[A-Za-z0-9+/=]{40,}["']?'''
tags = ["key", "gigachat", "env"]

[[rules]]
id = "gigachat-basic-auth-header"
description = "Hardcoded Basic authorization header"
regex = '''(?i)Authorization\s*[:=]\s*["']?Basic\s+[A-Za-z0-9+/=]{20,}["']?'''
tags = ["auth", "gigachat", "basic"]

[[rules]]
id = "gigachat-bearer-auth-header"
description = "Hardcoded Bearer authorization header"
regex = '''(?i)Authorization\s*[:=]\s*["']?Bearer\s+[A-Za-z0-9\-._~+/]{20,}=*["']?'''
tags = ["auth", "token", "bearer"]
