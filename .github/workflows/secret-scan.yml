name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main
      - feature/**

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest detect \
            --source /repo \
            --no-git \
            --config /repo/.gitleaks.toml \
            --redact \
            --verbose
